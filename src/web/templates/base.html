<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GRA Browser{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #fff; border-bottom: 1px solid #ddd; padding: 20px 0; margin-bottom: 30px; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .nav { margin-top: 20px; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9f9f9; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .status { display: inline-block; padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: 600; }
        .status.active { background: #d4edda; color: #155724; }
        .status.pending { background: #fff3cd; color: #856404; }
        .pagination { margin-top: 30px; text-align: center; }
        .pagination a, .pagination span { display: inline-block; padding: 8px 12px; margin: 0 4px; border: 1px solid #ddd; border-radius: 3px; }
        .pagination a:hover { background: #f9f9f9; }
        .pagination .current { background: #0066cc; color: #fff; border-color: #0066cc; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat { background: #fff; padding: 20px; border-radius: 4px; border-left: 4px solid #0066cc; }
        .stat-value { font-size: 32px; font-weight: 700; color: #0066cc; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; text-transform: uppercase; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>🧬 GRA Person Browser</h1>
            <p>Browse clustered persons and verify linkages across census years</p>
            <div class="nav">
                <a href="/">Home</a> |
                <a href="/audit">Audit Log</a>
            </div>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
