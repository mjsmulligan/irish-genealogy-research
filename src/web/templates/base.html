<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}grá Person Browser{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #1a1a1f; }
        body {
            background: #1a1a1f;
            color: #e8e8ec;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        h1, h2, h3, h4 { font-family: 'Spectral', serif; font-weight: 600; }
        h1 { font-size: 32px; margin-bottom: 8px; }
        h2 { font-size: 24px; margin-bottom: 16px; }
        h3 { font-size: 18px; margin-bottom: 12px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        header { background: #242429; border-bottom: 1px solid #35353d; padding: 30px 0; margin-bottom: 30px; }
        header .container { padding: 30px 20px; }
        header p { color: #8a8a99; font-size: 14px; margin-bottom: 15px; }

        .nav { display: flex; gap: 20px; margin-top: 20px; }
        a { color: #4a7c6f; text-decoration: none; transition: color 0.2s; }
        a:hover { color: #5a9c8f; }

        .card { background: #242429; border: 1px solid #35353d; padding: 20px; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: transparent;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #35353d;
            font-weight: 600;
            color: #8a8a99;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { padding: 12px; border-bottom: 1px solid #35353d; color: #e8e8ec; }
        tr:hover { background: #2a2a2f; }

        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status.proposed { background: #7a6fa8; color: #e8e8ec; }
        .status.confirmed { background: #4caf82; color: #e8e8ec; }
        .status.flagged { background: #b84444; color: #e8e8ec; }

        .score-band {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .score-band.green { background: #4caf82; color: #1a1a1f; }
        .score-band.amber { background: #c97b2e; color: #e8e8ec; }
        .score-band.red { background: #b84444; color: #e8e8ec; }

        .census-badges {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .census-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .census-badge.present { background: #4a7c6f; color: #1a1a1f; }
        .census-badge.absent { background: #52525e; color: #52525e; }
        .timeline-connector {
            height: 1px;
            width: 6px;
            background: #35353d;
        }

        .person-row {
            display: table-row;
            cursor: pointer;
            transition: background 0.2s;
        }
        .person-row:hover {
            background: #2a2a2f;
        }
        .person-row-link {
            display: table-cell;
            padding: 12px;
            text-decoration: none;
            color: inherit;
        }

        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #8a8a99;
            letter-spacing: 0.5px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 12px;
            background: #35353d;
            border: 1px solid #35353d;
            color: #8a8a99;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background: #3a3a42;
            border-color: #4a7c6f;
        }
        .filter-btn.active {
            background: #4a7c6f;
            color: #1a1a1f;
            border-color: #4a7c6f;
        }

        .pagination { margin-top: 30px; text-align: center; display: flex; gap: 4px; justify-content: center; }
        .pagination a, .pagination span { display: inline-block; padding: 8px 12px; border: 1px solid #35353d; border-radius: 3px; }
        .pagination a { color: #4a7c6f; background: #242429; cursor: pointer; }
        .pagination a:hover { background: #2a2a2f; border-color: #4a7c6f; }
        .pagination .current { background: #4a7c6f; color: #1a1a1f; border-color: #4a7c6f; }
        .pagination span { color: #52525e; }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .detail-table thead { background: transparent; }
        .detail-table th {
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #35353d;
            font-size: 12px;
            font-weight: 600;
        }
        .detail-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #35353d;
        }
        .detail-table .absent {
            color: #52525e;
            background: rgba(52, 53, 61, 0.3);
        }

        .scores-panel {
            margin-top: 30px;
            padding: 20px;
            background: #2a2a2f;
            border: 1px solid #35353d;
            border-radius: 4px;
        }
        .scores-panel h4 {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .stat {
            background: #242429;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid #4a7c6f;
            margin-bottom: 20px;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: #4a7c6f; font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 12px; color: #8a8a99; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4a7c6f;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }

        code {
            background: #35353d;
            padding: 2px 6px;
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #8a8a99;
        }

        .empty-state {
            background: rgba(52, 53, 61, 0.5);
            padding: 40px;
            text-align: center;
            border-radius: 4px;
            color: #8a8a99;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>grá Person Browser</h1>
            <p>Review linked Person clusters across 1901, 1911, 1926 census records</p>
            <div class="nav">
                <a href="/">Browse</a>
                <a href="/audit">Audit Log</a>
            </div>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
